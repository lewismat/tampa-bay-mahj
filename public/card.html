<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meet Holly — Tampa Bay Mahj</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Karla:wght@300;400;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F2E4;--cream-2:#EFE7CC;--sage:#4C5B40;--sage-soft:#6B7A5C;--sage-dk:#3B4832;--gold:#C9A24B;--ink:#2C3327;--ink-soft:#5D6656;--tile:#FBF8EF;--tile-edge:#DED3B4;--display:'Cormorant Garamond',Georgia,serif;--script:'Great Vibes',cursive;--body:'Karla',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--cream);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;
background-image:repeating-linear-gradient(90deg,rgba(222,211,180,.16) 0 2px,transparent 2px 26px)}
.card{background:var(--tile);border:1px solid var(--tile-edge);border-bottom:7px solid var(--gold);border-radius:22px;box-shadow:0 20px 50px rgba(59,72,50,.16);max-width:460px;width:100%;padding:38px 34px;text-align:center}
.photo{width:120px;height:120px;border-radius:50%;object-fit:cover;margin:0 auto 16px;border:3px solid var(--gold);background:var(--cream-2);display:block}
.photo.ph{display:flex;align-items:center;justify-content:center;font-family:var(--script);color:var(--gold);font-size:2.6rem}
h1{font-family:var(--display);font-weight:700;font-size:2.1rem;color:var(--sage-dk)}
.tagline{font-family:var(--script);color:var(--gold);font-size:1.6rem;line-height:1;margin-top:2px}
.bio{color:var(--ink-soft);font-weight:300;margin:16px 0;line-height:1.65}
.block{text-align:left;margin-top:16px;border-top:1px solid var(--tile-edge);padding-top:14px}
.block h3{font-family:var(--body);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sage-soft);font-weight:700;margin-bottom:5px}
.block p{color:var(--ink);font-size:.95rem;white-space:pre-line}
.links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:22px}
.links a{text-decoration:none;font-weight:700;font-size:.85rem;padding:9px 16px;border-radius:20px;border:1.5px solid var(--sage);color:var(--sage)}
.links a.solid{background:var(--sage);color:var(--cream);border-color:var(--sage)}
.foot{margin-top:22px;font-size:.75rem;color:var(--ink-soft);font-weight:300}
</style></head>
<body>
<div class="card" id="card"><p class="bio">Loading…</p></div>
<script>
function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function block(label,val){return val?('<div class="block"><h3>'+label+'</h3><p>'+esc(val)+'</p></div>'):'';}
(async function(){
  var p={}; try{ p=(await fetch('/api/profile').then(r=>r.json())).profile||{}; }catch(e){}
  var name=p.display_name||'Holly';
  var photo=p.photo_url?('<img class="photo" src="'+esc(p.photo_url)+'" alt="'+esc(name)+'">'):('<div class="photo ph">'+esc(name.charAt(0))+'</div>');
  var links=[];
  if(p.instagram) links.push('<a href="'+esc(p.instagram)+'" target="_blank" rel="noopener">Instagram</a>');
  if(p.shopmy)    links.push('<a href="'+esc(p.shopmy)+'" target="_blank" rel="noopener">ShopMy</a>');
  if(p.website)   links.push('<a href="'+esc(p.website)+'" target="_blank" rel="noopener">Website</a>');
  links.push('<a class="solid" href="/book">Book a session</a>');
  document.getElementById('card').innerHTML =
    photo +
    '<h1>'+esc(name)+'</h1>' +
    (p.tagline?'<div class="tagline">'+esc(p.tagline)+'</div>':'') +
    (p.bio?'<p class="bio">'+esc(p.bio)+'</p>':'') +
    block('What I offer',p.offerings) +
    block('Credentials',p.credentials) +
    block('Get in touch',[p.email,p.phone].filter(Boolean).join(' · ')) +
    '<div class="links">'+links.join('')+'</div>' +
    '<div class="foot">Tampa Bay Mahj · Tampa, Florida</div>';
  document.title=name+' — Tampa Bay Mahj';
})();
</script>
</body></html>
