<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inquiries — Tampa Bay Mahj</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Karla:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="/theme.js"></script>
<style>
:root{--cream:#F7F2E4;--cream-2:#EFE7CC;--sage:#4C5B40;--sage-soft:#6B7A5C;--sage-dk:#3B4832;--gold:#C9A24B;--gold-dk:#8A6D14;--red:#B3542E;--ink:#2C3327;--ink-soft:#5D6656;--tile:#FBF8EF;--tile-edge:#DED3B4;--display:'Cormorant Garamond',Georgia,serif;--body:'Karla',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--cream);color:var(--ink);min-height:100vh;background-image:repeating-linear-gradient(90deg,rgba(222,211,180,.16) 0 3px,transparent 3px 30px)}
.wrap{max-width:1200px;margin:0 auto;padding:24px 22px}
.top{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px}
h1{font-family:var(--display);font-weight:700;font-size:1.95rem;color:var(--sage-dk)}
.count{color:var(--ink-soft);font-size:.9rem;font-weight:300}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:14px 0}
.toolbar input{flex:1;min-width:220px;padding:10px 12px;border:1px solid var(--tile-edge);border-radius:10px;background:#fff;font-family:var(--body);font-size:.92rem;color:var(--sage-dk)}
.filters{display:flex;gap:4px;background:var(--tile);border:1px solid var(--tile-edge);border-radius:10px;padding:3px}
.fbtn{padding:7px 13px;border:none;border-radius:8px;background:none;color:var(--sage-soft);font-family:var(--body);font-weight:700;font-size:.78rem;cursor:pointer}
.fbtn.active{background:var(--sage);color:var(--cream)}
.tablewrap{background:var(--tile);border:1px solid var(--tile-edge);border-radius:14px;overflow:hidden;box-shadow:0 8px 22px rgba(59,72,50,.07)}
table{width:100%;border-collapse:collapse;font-size:.9rem}
thead th{background:var(--sage-dk);color:var(--cream);text-align:left;padding:11px 14px;font-weight:700;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
tbody tr.row{border-bottom:1px solid var(--cream-2);cursor:pointer}
tbody tr.row:nth-child(4n+1){background:rgba(255,255,255,.4)}
tbody tr.row:hover{background:rgba(201,162,75,.1)}
tbody td{padding:10px 14px;vertical-align:middle}
td.nm{font-family:var(--display);font-weight:700;font-size:1.02rem;color:var(--sage-dk)}
.muted{color:var(--ink-soft)}
.badge{display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 9px;border-radius:12px}
.badge.new{background:rgba(201,162,75,.2);color:var(--gold-dk)}
.badge.contacted{background:rgba(107,122,92,.2);color:var(--sage)}
.badge.booked{background:rgba(76,91,64,.2);color:var(--sage-dk)}
.badge.archived{background:var(--cream-2);color:var(--ink-soft)}
.detail td{background:var(--cream);padding:0}
.detail .inner{padding:18px 20px}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.dgrid .k{font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--sage-soft);font-weight:700}
.dgrid .v{color:var(--ink);font-size:.94rem;margin-top:2px}
.dgrid .wide{grid-column:1/-1}
.setrow{margin-top:14px;display:flex;align-items:center;gap:10px}
.setrow select{padding:8px 10px;border:1px solid var(--tile-edge);border-radius:8px;font-family:var(--body);background:#fff;color:var(--sage-dk)}
.empty{padding:30px;text-align:center;color:var(--ink-soft);font-weight:300}
</style></head>
<body>
<div class="wrap">
  <div class="top"><h1>Inquiries</h1><span class="count" id="count">—</span></div>
  <div class="toolbar">
    <input id="search" placeholder="Search name, email, event…">
    <div class="filters"><button class="fbtn active" data-f="">All</button><button class="fbtn" data-f="new">New</button><button class="fbtn" data-f="contacted">Contacted</button><button class="fbtn" data-f="booked">Booked</button><button class="fbtn" data-f="archived">Archived</button></div>
  </div>
  <div class="tablewrap">
    <table>
      <thead><tr><th>Received</th><th>Name</th><th>Event</th><th>Date</th><th>Guests</th><th>Status</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>
</div>
<script src="/sidebar.js"></script>
<script>
var all=[],curFilter='',openId=null;
function $(id){return document.getElementById(id);}
function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmt(d){return d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit',hour:'numeric',minute:'2-digit'}):'';}
function kv(k,v){return '<div><div class="k">'+k+'</div><div class="v">'+(v?esc(v):'<span class="muted">—</span>')+'</div></div>';}
async function guard(){var s=await fetch('/api/auth/state').then(r=>r.json());if(!s.authed){location.href='/login';return false;}return true;}
function render(){
  var q=($('search').value||'').toLowerCase();
  var list=all.filter(function(i){
    if(curFilter&&i.status!==curFilter)return false;
    if(q){var t=((i.firstName||'')+' '+(i.lastName||'')+' '+(i.email||'')+' '+(i.eventType||'')).toLowerCase();if(t.indexOf(q)<0)return false;}
    return true;
  });
  $('count').textContent=list.length+' inquir'+(list.length===1?'y':'ies');
  var tb=$('tbody');
  if(!list.length){tb.innerHTML='<tr><td colspan="6" class="empty">No inquiries'+((q||curFilter)?' match':' yet')+'.</td></tr>';return;}
  tb.innerHTML=list.map(function(i){
    return '<tr class="row" data-id="'+i.id+'">'+
      '<td class="muted">'+fmt(i.submittedAt)+'</td>'+
      '<td class="nm">'+esc((i.firstName||'')+' '+(i.lastName||''))+'<div class="muted" style="font-size:.8rem">'+esc(i.email||'')+'</div></td>'+
      '<td>'+esc(i.eventType||'')+'</td>'+
      '<td class="muted">'+esc(i.eventDate||'')+(i.startTime?' · '+esc(i.startTime):'')+'</td>'+
      '<td class="muted">'+esc(i.guestCount||'')+'</td>'+
      '<td><span class="badge '+esc(i.status)+'">'+esc(i.status)+'</span></td></tr>'+
      '<tr class="detail" id="d_'+i.id+'" style="display:none"><td colspan="6"><div class="inner" id="di_'+i.id+'"></div></td></tr>';
  }).join('');
  Array.prototype.forEach.call(tb.querySelectorAll('tr.row'),function(tr){tr.addEventListener('click',function(){toggle(tr.getAttribute('data-id'));});});
}
function toggle(id){
  var d=$('d_'+id);
  if(openId&&openId!==id)$('d_'+openId).style.display='none';
  if(d.style.display!=='none'){d.style.display='none';openId=null;return;}
  d.style.display='';openId=id;
  var i=all.filter(function(x){return x.id===id;})[0];if(!i)return;
  var addr=[i.streetAddress,i.city,i.state,i.zip].filter(Boolean).join(', ');
  var opts=['new','contacted','booked','archived'].map(function(o){return '<option'+(o===i.status?' selected':'')+'>'+o+'</option>';}).join('');
  $('di_'+id).innerHTML='<div class="dgrid">'+
    kv('Phone',i.phone)+kv('Email',i.email)+kv('Event type',i.eventType)+kv('Guests expected',i.guestCount)+
    kv('Date',i.eventDate)+kv('Start time',i.startTime)+kv('Location',i.locationName)+kv('Address',addr)+
    '<div class="wide">'+kv('About the event',i.aboutEvent)+'</div>'+
    (i.anythingElse?'<div class="wide">'+kv('Anything else',i.anythingElse)+'</div>':'')+
    '</div>'+
    '<div class="setrow"><span class="k">Status:</span><select id="st_'+id+'">'+opts+'</select><span class="muted" id="stmsg_'+id+'" style="font-size:.85rem"></span></div>';
  $('di_'+id).addEventListener('click',function(e){e.stopPropagation();});
  $('st_'+id).addEventListener('change',async function(){
    var m=$('stmsg_'+id);m.textContent='Saving…';
    var r=await fetch('/api/inquiries/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:this.value})}).then(x=>x.json());
    i.status=$('st_'+id).value;
    if(r.ok){m.textContent='Saved ✓';render();$('d_'+id)&&($('d_'+id).style.display='');}else{m.textContent='Error';}
  });
}
$('search').addEventListener('input',render);
Array.prototype.forEach.call(document.querySelectorAll('.fbtn'),function(b){b.addEventListener('click',function(){document.querySelectorAll('.fbtn').forEach(function(x){x.classList.remove('active');});b.classList.add('active');curFilter=b.getAttribute('data-f');render();});});
async function load(){var d=await fetch('/api/dashboard').then(r=>r.json());all=(d&&d.inquiries)||[];render();}
(async function(){if(await guard())load();})();
</script>
</body></html>
