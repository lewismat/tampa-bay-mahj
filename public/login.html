<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Tampa Bay Mahj</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Karla:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F2E4;--cream-2:#EFE7CC;--sage:#4C5B40;--sage-dk:#3B4832;--gold:#C9A24B;--ink:#2C3327;--ink-soft:#5D6656;--tile:#FBF8EF;--tile-edge:#DED3B4;--display:'Cormorant Garamond',Georgia,serif;--body:'Karla',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--cream);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
background-image:repeating-linear-gradient(90deg,rgba(222,211,180,.16) 0 2px,transparent 2px 26px)}
.box{background:var(--tile);border:1px solid var(--tile-edge);border-bottom:6px solid var(--gold);border-radius:18px;box-shadow:0 16px 40px rgba(59,72,50,.15);padding:34px 30px;width:100%;max-width:400px}
.logo{width:70px;height:70px;margin:0 auto 14px;border-radius:16px;background:var(--cream-2);border:1px solid var(--tile-edge);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;color:var(--sage);font-size:.8rem;text-align:center;line-height:1.05}
h1{font-family:var(--display);font-weight:700;font-size:1.7rem;color:var(--sage-dk);text-align:center}
.sub{text-align:center;color:var(--ink-soft);font-size:.9rem;font-weight:300;margin:4px 0 20px}
label{display:block;font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;color:var(--sage);font-weight:700;margin:12px 0 5px}
input{width:100%;padding:11px 12px;border:1px solid var(--tile-edge);border-radius:10px;background:#fff;font-family:var(--body);font-size:1rem;color:var(--sage-dk)}
input:focus{outline:2px solid var(--gold);border-color:var(--gold)}
button{width:100%;margin-top:20px;padding:12px;border:none;border-radius:10px;background:var(--sage);color:var(--cream);font-family:var(--body);font-weight:700;font-size:1rem;cursor:pointer}
button:hover{background:var(--sage-dk)}
.msg{margin-top:14px;font-size:.88rem;text-align:center;min-height:1.2em}
.msg.err{color:#B3542E}.msg.ok{color:var(--sage)}
.hint{font-size:.72rem;color:var(--ink-soft);margin-top:4px}
</style></head>
<body>
<div class="box">
  <div class="logo">TAMPA BAY MAHJ</div>
  <h1 id="title">Sign in</h1>
  <p class="sub" id="sub">Holly's dashboard</p>
  <form id="form" autocomplete="off">
    <div id="setupFields" style="display:none">
      <label>Your name</label><input name="name" id="name">
      <label>Email</label><input name="email" id="email" type="email">
    </div>
    <div id="userWrap"><label id="userLabel">Login (email or username)</label><input name="identifier" id="identifier"></div>
    <div id="passWrap"><label>Password</label><input name="password" id="password" type="password">
      <div class="hint" id="passHint" style="display:none">At least 8 characters.</div></div>
    <button type="submit" id="submitBtn">Sign in</button>
    <div class="msg" id="msg"></div>
  </form>
</div>
<script>
var setup=false;
async function init(){
  try{
    var s=await fetch('/api/auth/state').then(r=>r.json());
    if(s.authed){ location.href='/students'; return; }
    if(s.needsSetup){
      setup=true;
      document.getElementById('title').textContent='Set up your account';
      document.getElementById('sub').textContent='Create the first login for Tampa Bay Mahj';
      document.getElementById('setupFields').style.display='block';
      document.getElementById('userLabel').textContent='Username';
      document.getElementById('identifier').setAttribute('autocomplete','off');
      document.getElementById('passHint').style.display='block';
      document.getElementById('submitBtn').textContent='Create account';
    }
  }catch(e){}
}
document.getElementById('form').addEventListener('submit',async function(ev){
  ev.preventDefault();
  var msg=document.getElementById('msg'); msg.className='msg'; msg.textContent='Working…';
  var body,url;
  if(setup){
    url='/api/auth/setup';
    body={name:name.value,email:email.value,username:identifier.value,password:password.value};
  }else{
    url='/api/auth/login';
    body={identifier:identifier.value,password:password.value};
  }
  try{
    var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var d=await r.json();
    if(!d.ok){ msg.className='msg err'; msg.textContent=d.error||'Something went wrong.'; return; }
    msg.className='msg ok'; msg.textContent='Welcome!'; location.href='/students';
  }catch(e){ msg.className='msg err'; msg.textContent='Network error.'; }
});
init();
</script>
</body></html>
