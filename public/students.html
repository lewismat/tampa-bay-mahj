<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Students — Tampa Bay Mahj</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Karla:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F2E4;--cream-2:#EFE7CC;--sage:#4C5B40;--sage-soft:#6B7A5C;--sage-dk:#3B4832;--gold:#C9A24B;--red:#B3542E;--ink:#2C3327;--ink-soft:#5D6656;--tile:#FBF8EF;--tile-edge:#DED3B4;--display:'Cormorant Garamond',Georgia,serif;--body:'Karla',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--cream);color:var(--ink);min-height:100vh;background-image:repeating-linear-gradient(90deg,rgba(222,211,180,.16) 0 2px,transparent 2px 26px)}
.nav{background:var(--sage-dk);color:var(--cream);display:flex;align-items:center;gap:18px;padding:12px 22px;flex-wrap:wrap}
.nav .brand{font-family:var(--display);font-weight:700;font-size:1.15rem;margin-right:auto}
.nav a,.nav button{color:var(--cream);text-decoration:none;font-size:.85rem;font-weight:500;background:none;border:none;cursor:pointer;font-family:var(--body);opacity:.85}
.nav a.active{color:var(--gold);opacity:1;font-weight:700}.nav a:hover,.nav button:hover{opacity:1}
.wrap{max-width:1040px;margin:0 auto;padding:24px 22px;display:grid;grid-template-columns:minmax(280px,380px) 1fr;gap:20px}
@media(max-width:760px){.wrap{grid-template-columns:1fr}}
h1{font-family:var(--display);font-weight:700;font-size:1.9rem;color:var(--sage-dk);margin-bottom:2px}
.count{color:var(--ink-soft);font-size:.85rem;font-weight:300;margin-bottom:14px}
.panel{background:var(--tile);border:1px solid var(--tile-edge);border-radius:14px;padding:16px;box-shadow:0 8px 20px rgba(59,72,50,.07)}
input,textarea,select{width:100%;padding:10px 11px;border:1px solid var(--tile-edge);border-radius:9px;background:#fff;font-family:var(--body);font-size:.95rem;color:var(--sage-dk)}
textarea{min-height:70px;resize:vertical}
input:focus,textarea:focus,select:focus{outline:2px solid var(--gold);border-color:var(--gold)}
label{display:block;font-size:.64rem;letter-spacing:.09em;text-transform:uppercase;color:var(--sage);font-weight:700;margin:10px 0 4px}
.search{margin-bottom:12px}
.addbtn{width:100%;padding:10px;border:1.5px dashed var(--sage-soft);border-radius:10px;background:none;color:var(--sage);font-weight:700;cursor:pointer;font-family:var(--body);margin-bottom:12px}
.addform{display:none;margin-bottom:14px}
.addform.open{display:block}
.row{display:flex;gap:10px}.row>div{flex:1}
button.primary{padding:10px 18px;border:none;border-radius:9px;background:var(--sage);color:var(--cream);font-weight:700;cursor:pointer;font-family:var(--body);margin-top:12px}
button.primary:hover{background:var(--sage-dk)}
.list{display:flex;flex-direction:column;gap:8px;max-height:64vh;overflow:auto}
.item{text-align:left;background:#fff;border:1px solid var(--tile-edge);border-left:4px solid var(--sage-soft);border-radius:9px;padding:10px 12px;cursor:pointer}
.item:hover{border-left-color:var(--gold)}
.item.sel{border-left-color:var(--gold);background:var(--cream-2)}
.item b{font-family:var(--display);font-size:1.08rem;color:var(--sage-dk)}
.item .meta{font-size:.78rem;color:var(--ink-soft);margin-top:2px}
.chip{display:inline-block;font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:12px;background:rgba(76,91,64,.12);color:var(--sage);margin-left:6px}
.detail .empty{color:var(--ink-soft);font-weight:300;text-align:center;padding:60px 20px}
.msg{font-size:.88rem;margin-left:12px}.msg.ok{color:var(--sage)}.msg.err{color:var(--red)}
.hist{margin-top:18px;border-top:1px solid var(--tile-edge);padding-top:14px}
.hist h3{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-soft);font-weight:700;margin-bottom:8px}
.hrow{font-size:.85rem;color:var(--ink-soft);padding:5px 0;border-bottom:1px dashed var(--tile-edge)}
.hrow b{color:var(--sage-dk)}
</style></head>
<body>
<div class="nav"><span class="brand">Tampa Bay Mahj</span>
  <a href="/dashboard">Dashboard</a><a href="/schedule">Scheduling</a>
  <a href="/students" class="active">Students</a><a href="/profile">Profile</a>
  <a href="/card" target="_blank">Public card ↗</a><button id="logout">Log out</button></div>
<div class="wrap">
  <div>
    <h1>Students</h1><div class="count" id="count">—</div>
    <input class="search" id="search" placeholder="Search name, email, tag…">
    <button class="addbtn" id="addToggle">+ Add a student</button>
    <div class="addform panel" id="addform">
      <div class="row"><div><label>First name*</label><input id="a_first"></div><div><label>Last name</label><input id="a_last"></div></div>
      <div class="row"><div><label>Email</label><input id="a_email"></div><div><label>Phone</label><input id="a_phone"></div></div>
      <label>Skill level</label>
      <select id="a_skill"><option value="beginner">Beginner</option><option value="advanced_beginner">Advanced beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
      <label>Tags (comma separated)</label><input id="a_tags" placeholder="snowbird, VIP">
      <button class="primary" id="a_save">Add student</button><span class="msg" id="a_msg"></span>
    </div>
    <div class="list" id="list"></div>
  </div>
  <div class="detail panel" id="detail"><div class="empty">Pick a student to see their profile, or add one.</div></div>
</div>
<script>
var SKILL={beginner:'Beginner',advanced_beginner:'Adv. beginner',intermediate:'Intermediate',advanced:'Advanced'};
var selId=null;
function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function val(id){return document.getElementById(id).value.trim();}
async function guard(){var s=await fetch('/api/auth/state').then(r=>r.json());if(!s.authed){location.href='/login';return false;}return true;}

async function loadList(){
  var q=val('search');
  var d=await fetch('/api/students'+(q?'?q='+encodeURIComponent(q):'')).then(r=>r.json());
  var list=document.getElementById('list');
  document.getElementById('count').textContent=(d.students||[]).length+' student'+((d.students||[]).length===1?'':'s');
  list.innerHTML=(d.students||[]).map(function(s){
    var nm=esc((s.first_name||'')+' '+(s.last_name||'')).trim();
    return '<button class="item'+(s.id===selId?' sel':'')+'" data-id="'+s.id+'"><b>'+nm+'</b><span class="chip">'+(SKILL[s.skill_level]||s.skill_level)+'</span><div class="meta">'+esc(s.email||s.phone||'—')+(s.tags?' · '+esc(s.tags):'')+'</div></button>';
  }).join('')||'<div class="count">No students yet.</div>';
  Array.prototype.forEach.call(list.querySelectorAll('.item'),function(el){el.addEventListener('click',function(){openStudent(el.getAttribute('data-id'));});});
}
async function openStudent(id){
  selId=id;
  var d=await fetch('/api/students/'+id).then(r=>r.json());
  if(!d.ok)return;
  var s=d.student,h=d.history||{bookings:[],inquiries:[]};
  var skillOpts=Object.keys(SKILL).map(function(k){return '<option value="'+k+'"'+(s.skill_level===k?' selected':'')+'>'+SKILL[k]+'</option>';}).join('');
  var hist='';
  (h.bookings||[]).forEach(function(b){hist+='<div class="hrow"><b>Booking</b> · '+(b.seats||1)+' seat(s) · '+esc(b.status||'')+' · '+new Date(b.created_at).toLocaleDateString()+'</div>';});
  (h.inquiries||[]).forEach(function(q){hist+='<div class="hrow"><b>Inquiry</b> · '+esc(q.event_type||'')+' · '+esc(q.event_date||'')+' · '+esc(q.status||'')+'</div>';});
  if(!hist)hist='<div class="hrow">No bookings or inquiries linked to this email yet.</div>';
  document.getElementById('detail').innerHTML=
    '<div class="row"><div><label>First name</label><input id="d_first" value="'+esc(s.first_name)+'"></div><div><label>Last name</label><input id="d_last" value="'+esc(s.last_name||'')+'"></div></div>'+
    '<div class="row"><div><label>Email</label><input id="d_email" value="'+esc(s.email||'')+'"></div><div><label>Phone</label><input id="d_phone" value="'+esc(s.phone||'')+'"></div></div>'+
    '<div class="row"><div><label>Skill level</label><select id="d_skill">'+skillOpts+'</select></div><div><label>Birthday</label><input id="d_birthday" type="date" value="'+esc(s.birthday||'')+'"></div></div>'+
    '<label>Tags</label><input id="d_tags" value="'+esc(s.tags||'')+'">'+
    '<label>Notes</label><textarea id="d_notes">'+esc(s.notes||'')+'</textarea>'+
    '<div><button class="primary" id="d_save">Save changes</button><span class="msg" id="d_msg"></span></div>'+
    '<div class="hist"><h3>History</h3>'+hist+'</div>';
  document.getElementById('d_save').addEventListener('click',async function(){
    var msg=document.getElementById('d_msg');msg.className='msg';msg.textContent='Saving…';
    var body={first_name:val('d_first'),last_name:val('d_last'),email:val('d_email'),phone:val('d_phone'),skill_level:document.getElementById('d_skill').value,birthday:val('d_birthday'),tags:val('d_tags'),notes:document.getElementById('d_notes').value};
    var r=await fetch('/api/students/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(x=>x.json());
    if(r.ok){msg.className='msg ok';msg.textContent='Saved ✓';loadList();}else{msg.className='msg err';msg.textContent=r.error||'Error';}
  });
  loadList();
}
document.getElementById('addToggle').addEventListener('click',function(){document.getElementById('addform').classList.toggle('open');});
document.getElementById('a_save').addEventListener('click',async function(){
  var msg=document.getElementById('a_msg');msg.className='msg';
  if(!val('a_first')){msg.className='msg err';msg.textContent='First name required';return;}
  msg.textContent='Adding…';
  var body={first_name:val('a_first'),last_name:val('a_last'),email:val('a_email'),phone:val('a_phone'),skill_level:document.getElementById('a_skill').value,tags:val('a_tags')};
  var d=await fetch('/api/students',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
  if(d.ok){['a_first','a_last','a_email','a_phone','a_tags'].forEach(function(i){document.getElementById(i).value='';});msg.className='msg ok';msg.textContent='Added ✓';document.getElementById('addform').classList.remove('open');loadList();openStudent(d.student.id);}
  else{msg.className='msg err';msg.textContent=d.error||'Error';}
});
var st;document.getElementById('search').addEventListener('input',function(){clearTimeout(st);st=setTimeout(loadList,250);});
document.getElementById('logout').addEventListener('click',async function(){await fetch('/api/auth/logout',{method:'POST'});location.href='/login';});
(async function(){if(await guard())loadList();})();
</script>
</body></html>
