<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your booking — Tampa Bay Mahj</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Karla:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F7F2E4;--cream-2:#EFE7CC;--sage:#4C5B40;--sage-dk:#3B4832;--gold:#C9A24B;
  --ink:#2C3327;--ink-soft:#5D6656;--tile-face:#FBF8EF;--tile-edge:#DED3B4;
  --display:'Cormorant Garamond',Georgia,serif;--body:'Karla',system-ui,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--body);color:var(--ink);min-height:100vh;
  background:repeating-linear-gradient(90deg,var(--cream) 0 28px,var(--cream-2) 28px 56px);
  display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--tile-face);border:1px solid var(--tile-edge);border-bottom:6px solid var(--tile-edge);
  border-radius:16px;padding:34px;max-width:440px;width:100%;box-shadow:0 8px 26px rgba(44,51,39,.12);text-align:center}
img{max-height:80px;margin-bottom:8px}
h1{font-family:var(--display);font-size:2rem;margin:.2rem 0 .4rem;font-weight:600}
.when{font-family:var(--display);font-size:1.35rem;font-weight:700;color:var(--sage-dk);margin:14px 0 4px}
p{color:var(--ink-soft);margin:6px 0;font-size:.94rem}
.btns{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap}
.btn{border-radius:9px;padding:11px 18px;font-weight:700;font-size:.88rem;cursor:pointer;
  text-decoration:none;font-family:var(--body);border:1.5px solid var(--sage);color:var(--sage-dk);background:none}
.btn:hover{background:rgba(123,140,106,.1)}
.btn.solid{background:var(--sage);color:var(--cream);border-color:var(--sage)}
.btn.solid:hover{background:var(--sage-dk)}
.btn.danger{border-color:var(--tile-edge);color:var(--ink-soft)}
.btn.danger:hover{border-color:#9B3B2E;color:#9B3B2E;background:none}
.cx{opacity:.6}
</style>
</head>
<body>
<div class="card" id="card"><p>Loading…</p></div>
<script>
const TZ='America/New_York';
const LABEL={private_lesson:'Private lesson',group_class:'Group class',private_party:'Private party'};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const token=location.pathname.split('/').filter(Boolean).pop();
const card=document.getElementById('card');

(async()=>{
  try{
    const r=await fetch('/api/booking/'+token);
    const b=await r.json();
    if(!r.ok) throw new Error(b.error||'We could not find that booking.');
    draw(b);
  }catch(e){ card.innerHTML=`<h1>Not found</h1><p>${esc(e.message)}</p>`; }
})();

function draw(b){
  const s=b.slots;
  const when=new Intl.DateTimeFormat('en-US',{timeZone:TZ,weekday:'long',month:'long',day:'numeric',
    hour:'numeric',minute:'2-digit'}).format(new Date(s.starts_at));
  const cancelled=b.status==='cancelled';
  card.className='card'+(cancelled?' cx':'');
  card.innerHTML=`
    <img src="/logo.png" alt="Tampa Bay Mahj" onerror="this.remove()">
    <h1>${cancelled?'Cancelled':'You are booked'}</h1>
    <div class="when">${when}</div>
    <p>${LABEL[s.slot_type]} · ${s.duration_minutes} minutes${b.seats>1?` · ${b.seats} seats`:''}</p>
    ${s.location?`<p>${esc(s.location)}</p>`:''}
    <p>${esc(b.first_name)} ${esc(b.last_name)} · ${esc(b.email)}</p>
    ${cancelled
      ? `<div class="btns"><a class="btn solid" href="/book">Find another time</a></div>`
      : `<div class="btns">
          <a class="btn solid" href="/booking/${esc(token)}/google" target="_blank" rel="noopener">Add to Google Calendar</a>
          <a class="btn" href="/booking/${esc(token)}/calendar.ics">Apple / Outlook (.ics)</a>
          <button class="btn danger" id="cx">Cancel booking</button>
        </div>`}
  `;
  const btn=document.getElementById('cx');
  if(btn) btn.onclick=async()=>{
    if(!confirm('Cancel this booking? Your seat goes back on the calendar.')) return;
    btn.disabled=true;btn.textContent='Cancelling…';
    const r=await fetch('/api/booking/'+token+'/cancel',{method:'POST'});
    if(r.ok) draw({...b,status:'cancelled'});
    else { btn.disabled=false;btn.textContent='Cancel booking';alert('Could not cancel. Please text Holly.'); }
  };
}
</script>
<script src="/toast.js"></script>
</body>
</html>
