<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Request a lesson — Tampa Bay Mahj</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Karla:wght@300;400;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F2E4;--cream-2:#EFE7CC;--sage:#4C5B40;--sage-dk:#3B4832;--gold:#C9A24B;--red:#B3542E;--ink:#2C3327;--ink-soft:#5D6656;--tile:#FBF8EF;--tile-edge:#DED3B4;--display:'Cormorant Garamond',Georgia,serif;--script:'Great Vibes',cursive;--body:'Karla',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--cream);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
background-image:repeating-linear-gradient(90deg,rgba(222,211,180,.16) 0 2px,transparent 2px 26px)}
.box{background:var(--tile);border:1px solid var(--tile-edge);border-bottom:6px solid var(--gold);border-radius:18px;box-shadow:0 16px 40px rgba(59,72,50,.15);padding:34px 30px;width:100%;max-width:440px}
h1{font-family:var(--display);font-weight:700;font-size:2rem;color:var(--sage-dk);text-align:center}
.script{font-family:var(--script);color:var(--gold);font-size:1.5rem;text-align:center;line-height:1;margin-top:-2px}
.sub{text-align:center;color:var(--ink-soft);font-size:.94rem;font-weight:300;margin:8px 0 18px}
label{display:block;font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;color:var(--sage);font-weight:700;margin:12px 0 5px}
input,textarea{width:100%;padding:11px 12px;border:1px solid var(--tile-edge);border-radius:10px;background:#fff;font-family:var(--body);font-size:1rem;color:var(--sage-dk)}
textarea{min-height:84px;resize:vertical}
input:focus,textarea:focus{outline:2px solid var(--gold);border-color:var(--gold)}
.row{display:flex;gap:12px}.row>div{flex:1}
button{width:100%;margin-top:20px;padding:12px;border:none;border-radius:10px;background:var(--sage);color:var(--cream);font-family:var(--body);font-weight:700;font-size:1rem;cursor:pointer}
button:hover{background:var(--sage-dk)}
.msg{margin-top:14px;font-size:.9rem;text-align:center;min-height:1.2em}.msg.err{color:var(--red)}
.done{text-align:center;padding:14px 0}
.done .big{font-family:var(--script);font-size:2.6rem;color:var(--gold);line-height:1}
.done p{color:var(--ink-soft);margin-top:8px;font-weight:300}
.back{display:block;text-align:center;margin-top:16px;font-size:.85rem;color:var(--sage);text-decoration:none}
</style></head>
<body>
<div class="box" id="box">
  <h1>Request a lesson</h1>
  <div class="script">with Holly</div>
  <p class="sub">Tell Holly a little about you and she'll reach out to set up your first game.</p>
  <form id="form" autocomplete="off">
    <div class="row"><div><label>First name*</label><input id="first"></div><div><label>Last name</label><input id="last"></div></div>
    <div class="row"><div><label>Email</label><input id="email" type="email"></div><div><label>Phone</label><input id="phone"></div></div>
    <label>What would you like to learn?</label>
    <textarea id="message" placeholder="New to mahjong? Played before? Solo or with friends?"></textarea>
    <button type="submit" id="submit">Send my request</button>
    <div class="msg" id="msg"></div>
  </form>
  <a class="back" href="/card">← Back to Holly's card</a>
</div>
<script>
function val(id){return document.getElementById(id).value.trim();}
document.getElementById('form').addEventListener('submit',async function(ev){
  ev.preventDefault();
  var msg=document.getElementById('msg');msg.className='msg';
  if(!val('first')||(!val('email')&&!val('phone'))){msg.className='msg err';msg.textContent='Please add your name and an email or phone.';return;}
  msg.textContent='Sending…';
  var body={first_name:val('first'),last_name:val('last'),email:val('email'),phone:val('phone'),message:val('message')};
  try{
    var d=await fetch('/api/lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
    if(!d.ok){msg.className='msg err';msg.textContent=d.error||'Something went wrong.';return;}
    document.getElementById('box').innerHTML='<div class="done"><div class="big">Thank you!</div><p>Holly has your request and will be in touch soon.</p><a class="back" href="/card">← Back to Holly’s card</a></div>';
  }catch(e){msg.className='msg err';msg.textContent='Network error — please try again.';}
});
</script>
</body></html>
